<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tweeter</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <span class="brand-icon">🐦</span>
      <h1>Entrar no Tweeter</h1>
      <p class="subtitle">Conecte-se com o que está acontecendo</p>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="••••••••" minlength="6" required />
      </div>

      <button class="btn btn-primary" onclick="entrar()">Entrar</button>

      <div class="auth-links">
        <a href="#">Esqueceu sua senha?</a>
        <br /><br />
        Não tem uma conta? <a href="cadastro.html">Criar conta</a>
      </div>

    </div>
  </div>

  <script>
    function entrar() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      if (!email || !senha) { alert('Preencha e-mail e senha.'); return; }
      window.location.href = 'feed.html';
    }
  </script>

</body>
</html>
