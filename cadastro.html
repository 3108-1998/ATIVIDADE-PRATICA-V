<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Tweeter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <span class="brand-icon">🐦</span>
      <h1>Criar conta</h1>
      <p class="subtitle">É rápido e fácil.</p>

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" placeholder="@seu_usuario"
          pattern="[a-zA-Z0-9_]+" title="Apenas letras, números e underline" required />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" minlength="6" required />
      </div>

      <div class="form-group">
        <label for="confirmar-senha">Confirmação de senha</label>
        <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Repita a senha" minlength="6" required />
      </div>

      <div class="form-group">
        <label for="genero">Gênero</label>
        <select id="genero" name="genero" required>
          <option value="" disabled selected>Selecione</option>
          <option value="feminino">Feminino</option>
          <option value="masculino">Masculino</option>
          <option value="nao-binario">Não-binário</option>
          <option value="prefiro-nao-informar">Prefiro não informar</option>
        </select>
      </div>

      <div class="form-group">
        <label for="nascimento">Data de nascimento</label>
        <input type="date" id="nascimento" name="nascimento" required />
      </div>

      <button class="btn btn-primary" onclick="cadastrar()">Cadastrar</button>
      <button class="btn btn-outline" onclick="window.location.href='index.html'">
        Já possuo uma conta
      </button>

    </div>
  </div>

  <script>
    function cadastrar() {
      const nome      = document.getElementById('nome').value.trim();
      const email     = document.getElementById('email').value.trim();
      const usuario   = document.getElementById('usuario').value.trim();
      const senha     = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar-senha').value;
      const genero    = document.getElementById('genero').value;
      const nasc      = document.getElementById('nascimento').value;

      if (!nome || !email || !usuario || !senha || !confirmar || !genero || !nasc) {
        alert('Preencha todos os campos.'); return;
      }
      if (senha !== confirmar) { alert('As senhas não coincidem.'); return; }
      window.location.href = 'feed.html';
    }
  </script>

</body>
</html>
